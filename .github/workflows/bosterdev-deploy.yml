name: Boster.dev CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bosterdev-deploy.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'docs/**'
      - 'scripts/**'
      - 'src/boster.dev/**'
      - 'test/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - '.github/workflows/bosterdev-deploy.yml'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.gitignore'
      - 'AGENTS.md'
      - 'docs/**'
      - 'scripts/**'
      - 'src/boster.dev/**'
      - 'test/**'

jobs:
  build_and_deploy_job:
    defaults:
      run:
        # jobs.<job_id>.defaults.run
        # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_iddefaultsrun
        working-directory: ./src/boster.dev/

    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Not needed with a .ruby-version file

      - name: Set up BATS
        uses: bats-core/bats-action@4.0.0

      - name: Verify site
        working-directory: ${{ github.workspace }}
        run: scripts/test-and-preview.sh --check-only

      - name: Build And Deploy
        if: github.event_name != 'pull_request' || github.actor != 'dependabot[bot]'
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          skip_app_build: true
          app_location: "${{ github.workspace }}/src/boster.dev/_site" # App source code path

  close_pull_request_job:
    defaults:
      run:
        # jobs.<job_id>.defaults.run
        # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_iddefaultsrun
        working-directory: ./src/boster.dev/

    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
